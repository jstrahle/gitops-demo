apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: dev-argocd
  namespace: dev-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  server:
    route:
      enabled: true        # gives developers a URL to reach the UI
  sso:
    dex:
      openShiftOAuth: true
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 250m
          memory: 128Mi
    provider: dex
  rbac:
    defaultPolicy: "role:admin"
    scopes: "[groups]"
    policy: |
      g, team-a-admins, role:admin
      g, system:cluster-admins, role:admin
      g, cluster-admins, role:admin
      g, admin, role:admin
