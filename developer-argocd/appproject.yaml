apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-a
  namespace: dev-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  description: Guardrails for the team-a developer Argo CD instance
  sourceRepos:
    - 'https://github.com/YOUR_ORG/team-a-apps.git'   # only these repos
  destinations:
    - namespace: virtual-machines
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []      # empty = no cluster-scoped resources allowed
